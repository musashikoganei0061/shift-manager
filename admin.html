<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>勤務割管理 — 管理者</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F8F7F4;--surface:#FFFFFF;--surface2:#F2F1EE;
  --border:#E2E0DA;--border-strong:#CCCAC3;
  --text:#1A1917;--text-muted:#6B6860;--text-light:#9E9C96;
  --accent:#2563EB;--accent-bg:#EFF4FE;--accent-border:#BFCFFE;--accent-text:#1D4ED8;
  --success:#059669;--success-bg:#ECFDF5;--success-border:#A7F3D0;
  --warning:#D97706;--warning-bg:#FFFBEB;--warning-border:#FDE68A;
  --danger:#DC2626;--danger-bg:#FEF2F2;--danger-border:#FECACA;
  --radius:8px;--shadow:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.04);
}
@media(prefers-color-scheme:dark){:root{
  --bg:#1A1917;--surface:#242320;--surface2:#2C2B28;
  --border:#3A3935;--border-strong:#4E4D48;
  --text:#F0EEE8;--text-muted:#9E9C96;--text-light:#6B6860;
  --accent:#3B82F6;--accent-bg:#1E293B;--accent-border:#1D4ED8;--accent-text:#93C5FD;
  --success:#10B981;--success-bg:#064E3B;--success-border:#065F46;
  --warning:#F59E0B;--warning-bg:#451A03;--warning-border:#92400E;
  --danger:#EF4444;--danger-bg:#450A0A;--danger-border:#7F1D1D;
}}
body{font-family:-apple-system,'Hiragino Kaku Gothic ProN','Hiragino Sans',sans-serif;background:var(--bg);color:var(--text);font-size:15px;line-height:1.6;min-height:100vh}
.header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 1.5rem;position:sticky;top:0;z-index:100;box-shadow:var(--shadow)}
.header-inner{max-width:1100px;margin:0 auto;display:flex;align-items:center;gap:10px;height:56px}
.logo{font-size:16px;font-weight:600;letter-spacing:-.3px}.logo span{color:var(--accent)}
.sync-status{margin-left:auto;font-size:12px;color:var(--text-muted);display:flex;align-items:center;gap:6px}
.dot{width:8px;height:8px;border-radius:50%;background:var(--border-strong);flex-shrink:0}
.dot.ok{background:var(--success)}.dot.err{background:var(--danger)}.dot.spin{background:var(--warning)}
.main{max-width:1100px;margin:0 auto;padding:1.5rem}
.tabs{display:flex;gap:2px;background:var(--surface2);border-radius:10px;padding:3px;margin-bottom:1.5rem;width:fit-content;flex-wrap:wrap}
.tab{padding:7px 16px;border:none;background:none;cursor:pointer;font-size:13px;font-weight:500;color:var(--text-muted);border-radius:8px;transition:all .15s;display:flex;align-items:center;gap:5px}
.tab.active{background:var(--surface);color:var(--text);box-shadow:var(--shadow)}
.tab:hover:not(.active){color:var(--text)}
.panel{display:none}.panel.active{display:block}
.card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:1.25rem 1.5rem;margin-bottom:1rem}
.card-title{font-size:12px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:1rem}
label{font-size:13px;font-weight:500;color:var(--text-muted);display:block;margin-bottom:5px}
input[type=text],input[type=date],input[type=time],input[type=number],select{width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:var(--radius);background:var(--bg);color:var(--text);font-size:14px;font-family:inherit;transition:border-color .15s;outline:none;appearance:none;-webkit-appearance:none}
input:focus,select:focus{border-color:var(--accent);box-shadow:0 0 0 3px color-mix(in srgb,var(--accent) 15%,transparent)}
input[type=number]{width:68px;text-align:center}
.row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.field{margin-bottom:12px}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border:1px solid var(--border-strong);border-radius:var(--radius);background:var(--surface);color:var(--text);cursor:pointer;font-size:13px;font-weight:500;font-family:inherit;transition:all .15s;white-space:nowrap}
.btn:hover{background:var(--surface2)}.btn:active{transform:scale(.98)}
.btn-primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn-primary:hover{background:color-mix(in srgb,var(--accent) 85%,#000)}
.btn-success{background:var(--success);color:#fff;border-color:var(--success)}
.btn-success:hover{background:color-mix(in srgb,var(--success) 85%,#000)}
.btn-sm{padding:5px 12px;font-size:12px}
.btn-danger{color:var(--danger);border-color:var(--danger-border)}.btn-danger:hover{background:var(--danger-bg)}
.btn-icon{padding:6px;border-radius:6px;line-height:1}
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:500}
.badge-blue{background:var(--accent-bg);color:var(--accent-text);border:1px solid var(--accent-border)}
.badge-green{background:var(--success-bg);color:var(--success);border:1px solid var(--success-border)}
.badge-gray{background:var(--surface2);color:var(--text-muted);border:1px solid var(--border)}
.badge-warning{background:var(--warning-bg);color:var(--warning);border:1px solid var(--warning-border)}
.badge-danger{background:var(--danger-bg);color:var(--danger);border:1px solid var(--danger-border)}
.shift-block{display:flex;align-items:center;gap:10px;padding:9px 12px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:6px}
.shift-name{font-size:14px;font-weight:500;flex:1}.shift-time{font-size:12px;color:var(--text-muted)}
.tag-list{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.tag{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;background:var(--surface2);border:1px solid var(--border);border-radius:20px;font-size:13px}
.tag-remove{border:none;background:none;cursor:pointer;color:var(--text-light);padding:0;line-height:1;font-size:14px;transition:color .15s}.tag-remove:hover{color:var(--danger)}
.notice{padding:10px 14px;border-radius:var(--radius);font-size:13px;display:flex;align-items:flex-start;gap:8px}
.notice-info{background:var(--accent-bg);color:var(--accent-text);border:1px solid var(--accent-border)}
.notice-warning{background:var(--warning-bg);color:var(--warning);border:1px solid var(--warning-border)}
.day-cfg{overflow-x:auto;max-height:340px;overflow-y:auto}
.dcfg-table{width:100%;border-collapse:collapse;font-size:13px;min-width:400px}
.dcfg-table th{text-align:center;padding:7px 8px;font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.04em;color:var(--text-muted);background:var(--surface2);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:2;white-space:nowrap}
.dcfg-table th:first-child{text-align:left}
.dcfg-table td{padding:5px 8px;border-bottom:1px solid var(--border);text-align:center}
.dcfg-table td:first-child{text-align:left;white-space:nowrap}
.dcfg-table tr.weekend td{background:color-mix(in srgb,var(--warning-bg) 40%,transparent)}
.result-wrap{overflow-x:auto}
.result-table{border-collapse:collapse;font-size:12px;min-width:600px}
.result-table th{padding:6px 8px;font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.04em;color:var(--text-muted);background:var(--surface2);border:1px solid var(--border);white-space:nowrap;text-align:center}
.result-table th.name-col{text-align:left;min-width:90px;position:sticky;left:0;z-index:3}
.result-table td{padding:5px 6px;border:1px solid var(--border);text-align:center;vertical-align:middle}
.result-table td.name-col{text-align:left;font-weight:500;white-space:nowrap;background:var(--surface);position:sticky;left:0;z-index:2}
.result-table tr:hover td{background:color-mix(in srgb,var(--accent-bg) 30%,transparent)}
.result-table tr:hover td.name-col{background:color-mix(in srgb,var(--accent-bg) 50%,var(--surface))}
.result-table .we-col{background:color-mix(in srgb,var(--warning-bg) 35%,transparent)!important}
.cell-assigned{display:inline-block;padding:2px 8px;border-radius:12px;font-size:11px;font-weight:600;cursor:pointer;user-select:none;transition:all .15s}
.cell-assigned.manual{outline:2px solid var(--warning);outline-offset:1px}
.count-cell{font-weight:600;color:var(--accent-text);background:var(--accent-bg)!important}
.slot-0{background:var(--accent-bg);color:var(--accent-text);border:1px solid var(--accent-border)}
.slot-1{background:var(--success-bg);color:var(--success);border:1px solid var(--success-border)}
.slot-2{background:var(--warning-bg);color:var(--warning);border:1px solid var(--warning-border)}
.slot-3{background:var(--danger-bg);color:var(--danger);border:1px solid var(--danger-border)}
.slot-off{background:var(--surface2);color:var(--text-light);border:1px solid var(--border)}
.sum-table{width:100%;border-collapse:collapse;font-size:13px;min-width:400px}
.sum-table th{text-align:center;padding:7px 8px;font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.04em;color:var(--text-muted);border-bottom:1px solid var(--border);background:var(--surface2);white-space:nowrap}
.sum-table th:first-child{text-align:left}
.sum-table td{padding:7px 8px;border-bottom:1px solid var(--border);text-align:center}
.sum-table td:first-child{text-align:left;font-weight:500;white-space:nowrap}
.sum-table tr:last-child td{border-bottom:none}
.cell-ok{color:var(--success);font-weight:600}.cell-ng{color:var(--danger);font-weight:600}
.status-bar{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:1rem}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;display:flex;align-items:center;justify-content:center}
.modal{background:var(--surface);border-radius:16px;padding:1.5rem;min-width:300px;max-width:440px;width:90%;box-shadow:0 8px 32px rgba(0,0,0,.18)}
.modal-title{font-size:16px;font-weight:600;margin-bottom:1rem}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:1.25rem;flex-wrap:wrap}
@media(max-width:600px){.main{padding:1rem}.row,.row3{grid-template-columns:1fr}.tabs{width:100%}.tab{flex:1;justify-content:center;padding:7px 6px;font-size:12px}}
</style>
</head>
<body>
<header class="header">
  <div class="header-inner">
    <div class="logo">勤務割<span>管理</span></div>
    <span class="badge badge-blue" style="font-size:11px">管理者</span>
    <div class="sync-status">
      <span class="dot" id="sync-dot"></span>
      <span id="sync-label">接続中...</span>
      <button class="btn btn-sm" onclick="loadFromCloud(true)" style="padding:3px 10px;font-size:11px">再読み込み</button>
    </div>
  </div>
</header>
<main class="main">
  <div class="tabs" role="tablist">
    <button class="tab active" onclick="switchTab('admin')" id="tab-admin">管理者設定</button>
    <button class="tab" onclick="switchTab('auto')" id="tab-auto">自動割り当て</button>
    <button class="tab" onclick="switchTab('summary')" id="tab-summary">集計・確認</button>
  </div>

  <!-- 管理者設定 -->
  <div class="panel active" id="panel-admin">
    <div class="card">
      <div class="card-title">対象期間</div>
      <div class="row">
        <div class="field"><label>開始日</label><input type="date" id="start-date" value="2025-08-01"></div>
        <div class="field"><label>終了日</label><input type="date" id="end-date" value="2025-08-31"></div>
      </div>
      <button class="btn btn-primary btn-sm" onclick="applyPeriod()">期間を適用</button>
    </div>
    <div class="card">
      <div class="card-title">勤務枠</div>
      <div class="row3">
        <div class="field"><label>枠の名前</label><input type="text" id="slot-name" placeholder="例: 早番"></div>
        <div class="field"><label>開始時刻</label><input type="time" id="slot-start" value="09:00"></div>
        <div class="field"><label>終了時刻</label><input type="time" id="slot-end" value="18:00"></div>
      </div>
      <button class="btn btn-primary btn-sm" onclick="addSlot()">＋ 枠を追加</button>
      <div id="slot-list" style="margin-top:12px"></div>
    </div>
    <div class="card">
      <div class="card-title">勤務者</div>
      <div style="display:flex;gap:8px;align-items:flex-end">
        <div class="field" style="flex:1;margin-bottom:0"><label>名前</label><input type="text" id="worker-name" placeholder="例: 山田 太郎" onkeydown="if(event.key==='Enter')addWorker()"></div>
        <button class="btn btn-primary btn-sm" style="margin-bottom:0;height:38px" onclick="addWorker()">登録</button>
      </div>
      <div id="worker-list" class="tag-list"></div>
    </div>
    <div class="card">
      <div class="card-title">日ごとの必要人数</div>
      <p style="font-size:12px;color:var(--text-muted);margin-bottom:10px">各日・各枠の必要最低人数を入力してください</p>
      <div class="day-cfg"><div id="day-cfg-inner"></div></div>
    </div>
    <div class="card">
      <div class="card-title">クラウド保存</div>
      <p style="font-size:12px;color:var(--text-muted);margin-bottom:12px">設定を保存すると勤務者ページにも反映されます</p>
      <button class="btn btn-primary" onclick="saveToCloud()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
        設定を保存・共有する
      </button>
    </div>
  </div>

  <!-- 自動割り当て -->
  <div class="panel" id="panel-auto">
    <div class="card">
      <div class="card-title">自動割り当て</div>
      <div style="font-size:13px;color:var(--text-muted);margin-bottom:1rem;line-height:1.8">
        勤務者の希望をもとに均等に自動割り当てします。<br>
        <strong style="color:var(--text)">① 均等化　② 必要人数確保　③ 回数が少ない人を優先　④ 1人1日1枠</strong>
      </div>
      <div id="auto-notice" style="margin-bottom:1rem"></div>
      <div style="display:flex;gap:10px;flex-wrap:wrap">
        <button class="btn btn-success" onclick="runAutoAssign()">自動割り当てを実行</button>
        <button class="btn btn-sm btn-danger" onclick="clearAssign()">リセット</button>
      </div>
    </div>
    <div class="card" id="result-card" style="display:none">
      <div class="card-title" style="justify-content:space-between;flex-wrap:wrap;gap:8px">
        <span>割り当て結果（クリックで修正）</span>
        <div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap">
          <span id="result-stats" style="font-size:12px;color:var(--text-muted)"></span>
          <span style="font-size:11px;color:var(--text-light)">
            <span style="display:inline-block;width:10px;height:10px;border-radius:3px;background:var(--accent-bg);border:1px solid var(--accent-border);vertical-align:middle"></span> 自動　
            <span style="display:inline-block;width:10px;height:10px;border-radius:3px;border:2px solid var(--warning);background:var(--surface2);vertical-align:middle"></span> 手動修正
          </span>
        </div>
      </div>
      <div class="result-wrap"><table class="result-table" id="result-table"></table></div>
      <div style="margin-top:1rem">
        <button class="btn btn-primary" onclick="saveToCloud()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
          割り当て結果を保存・共有
        </button>
      </div>
    </div>
    <div class="card" id="shortage-auto-card" style="display:none">
      <div class="card-title" style="color:var(--warning)">人数不足の日</div>
      <div id="shortage-auto-area"></div>
    </div>
  </div>

  <!-- 集計 -->
  <div class="panel" id="panel-summary">
    <div class="card">
      <div class="card-title">勤務可能状況</div>
      <div id="summary-area"><p style="font-size:13px;color:var(--text-muted)">データを読み込み中...</p></div>
    </div>
    <div class="card" id="shortage-card" style="display:none">
      <div class="card-title" style="color:var(--warning)">人数不足の可能性がある日</div>
      <div id="shortage-area"></div>
    </div>
  </div>
</main>

<!-- モーダル -->
<div id="modal-bg" class="modal-bg" style="display:none" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-title" id="modal-title">割り当て変更</div>
    <div id="modal-body"></div>
    <div class="modal-actions">
      <button class="btn btn-sm" onclick="closeModal()">キャンセル</button>
      <button class="btn btn-sm btn-primary" onclick="applyModal()">変更する</button>
    </div>
  </div>
</div>

<script>
const BIN_ID = '6a4a22b779fa234c87d99770';
const API_KEY = '$2a$10$AefCCnZQSmM9s4rYdVmfoOkT6Q04DJxzACNzneVgQRqpYOIWiGRw6';
const API_URL = `https://api.jsonbin.io/v3/b/${BIN_ID}`;

let state = {
  startDate:'2025-08-01',endDate:'2025-08-31',
  slots:[{id:'s1',name:'早番',start:'08:00',end:'16:00'},{id:'s2',name:'遅番',start:'14:00',end:'22:00'}],
  workers:['山田 太郎','鈴木 花子','佐藤 次郎'],
  availability:{},required:{},assigned:{}
};
let modalCtx={};

// ── Cloud ──────────────────────────────
function setSyncStatus(type,msg){
  document.getElementById('sync-dot').className='dot '+type;
  document.getElementById('sync-label').textContent=msg;
}
async function loadFromCloud(showMsg){
  setSyncStatus('spin','読み込み中...');
  try{
    const r=await fetch(API_URL+'/latest',{headers:{'X-Master-Key':API_KEY}});
    if(!r.ok)throw new Error('HTTP '+r.status);
    const j=await r.json();
    const data=j.record;
    if(data&&data.slots&&data.workers){
      Object.assign(state,data);
      document.getElementById('start-date').value=state.startDate;
      document.getElementById('end-date').value=state.endDate;
      renderAll();
      if(showMsg)showToast('クラウドから読み込みました');
    }
    setSyncStatus('ok','同期済み');
  }catch(e){
    setSyncStatus('err','読み込み失敗');
    if(showMsg)alert('読み込みエラー: '+e.message);
    renderAll();
  }
}
async function saveToCloud(){
  setSyncStatus('spin','保存中...');
  try{
    const r=await fetch(API_URL,{
      method:'PUT',
      headers:{'Content-Type':'application/json','X-Master-Key':API_KEY},
      body:JSON.stringify(state)
    });
    if(!r.ok)throw new Error('HTTP '+r.status);
    setSyncStatus('ok','保存済み');
    showToast('クラウドに保存しました');
  }catch(e){
    setSyncStatus('err','保存失敗');
    alert('保存エラー: '+e.message);
  }
}

// ── Utilities ──────────────────────────
function getDates(){
  const res=[];const d=new Date(state.startDate);const end=new Date(state.endDate);
  while(d<=end){res.push(d.toISOString().slice(0,10));d.setDate(d.getDate()+1);}return res;
}
function fmtDate(s){const d=new Date(s+'T00:00:00');return `${d.getMonth()+1}/${d.getDate()}(${'日月火水木金土'[d.getDay()]})`;}
function isWe(s){const d=new Date(s+'T00:00:00');return d.getDay()===0||d.getDay()===6;}
function uid(){return 's'+Date.now()+Math.random().toString(36).slice(2,6);}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}
function reqFor(date,sid){const k=date+'__'+sid;return state.required[k]!==undefined?state.required[k]:2;}
function slotColor(i){return ['slot-0','slot-1','slot-2','slot-3'][i%4];}
function showToast(msg){
  let t=document.getElementById('toast');
  if(!t){t=document.createElement('div');t.id='toast';t.style.cssText='position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--text);color:var(--bg);padding:10px 20px;border-radius:20px;font-size:13px;font-weight:500;z-index:999;transition:opacity .3s;pointer-events:none';document.body.appendChild(t);}
  t.textContent=msg;t.style.opacity='1';clearTimeout(t._t);t._t=setTimeout(()=>{t.style.opacity='0';},2200);
}

// ── Tab ────────────────────────────────
function switchTab(t){
  ['admin','auto','summary'].forEach(n=>{
    document.getElementById('tab-'+n).classList.toggle('active',n===t);
    document.getElementById('panel-'+n).classList.toggle('active',n===t);
  });
  if(t==='auto')renderResultTable();
  if(t==='summary')renderSummary();
}

// ── Period ─────────────────────────────
function applyPeriod(){
  const s=document.getElementById('start-date').value,e=document.getElementById('end-date').value;
  if(!s||!e){alert('開始日と終了日を入力してください');return;}
  if(new Date(s)>new Date(e)){alert('開始日が終了日より後になっています');return;}
  state.startDate=s;state.endDate=e;
  renderDayCfg();alert('期間を適用しました（'+getDates().length+'日間）');
}

// ── Slots ──────────────────────────────
function addSlot(){
  const name=document.getElementById('slot-name').value.trim();
  const start=document.getElementById('slot-start').value,end=document.getElementById('slot-end').value;
  if(!name){alert('枠の名前を入力してください');return;}
  state.slots.push({id:uid(),name,start,end});
  document.getElementById('slot-name').value='';
  renderSlotList();renderDayCfg();
}
function removeSlot(id){
  if(!confirm('この枠を削除しますか？'))return;
  state.slots=state.slots.filter(s=>s.id!==id);
  renderSlotList();renderDayCfg();
}
function renderSlotList(){
  const el=document.getElementById('slot-list');
  if(!state.slots.length){el.innerHTML='<p style="font-size:13px;color:var(--text-muted)">枠がありません</p>';return;}
  el.innerHTML=state.slots.map(s=>`
    <div class="shift-block">
      <span class="shift-name">${esc(s.name)}</span>
      <span class="shift-time">${s.start}〜${s.end}</span>
      <button class="btn btn-icon btn-danger" onclick="removeSlot('${s.id}')">✕</button>
    </div>`).join('');
}

// ── Workers ────────────────────────────
function addWorker(){
  const name=document.getElementById('worker-name').value.trim();
  if(!name){alert('名前を入力してください');return;}
  if(state.workers.includes(name)){alert('すでに登録されています');return;}
  state.workers.push(name);
  document.getElementById('worker-name').value='';
  renderWorkerList();
}
function removeWorker(name){
  if(!confirm(`「${name}」を削除しますか？`))return;
  state.workers=state.workers.filter(w=>w!==name);
  delete state.availability[name];
  renderWorkerList();
}
function renderWorkerList(){
  const el=document.getElementById('worker-list');
  if(!state.workers.length){el.innerHTML='<p style="font-size:13px;color:var(--text-muted)">勤務者が登録されていません</p>';return;}
  el.innerHTML=state.workers.map(w=>`
    <span class="tag">${esc(w)}<button class="tag-remove" onclick="removeWorker('${esc(w)}')">✕</button></span>`).join('');
}

// ── Day config ─────────────────────────
function renderDayCfg(){
  const el=document.getElementById('day-cfg-inner'),dates=getDates();
  if(!dates.length||!state.slots.length){el.innerHTML='<p style="font-size:13px;color:var(--text-muted)">期間と勤務枠を設定してください</p>';return;}
  el.innerHTML=`<table class="dcfg-table">
    <thead><tr><th>日付</th>${state.slots.map(s=>`<th>${esc(s.name)}<br><span style="font-weight:400;font-size:10px">${s.start}〜${s.end}</span></th>`).join('')}</tr></thead>
    <tbody>${dates.map(date=>`
      <tr class="${isWe(date)?'weekend':''}">
        <td style="font-weight:500">${fmtDate(date)}</td>
        ${state.slots.map(s=>{const k=date+'__'+s.id,v=state.required[k]!==undefined?state.required[k]:2;
          return `<td><input type="number" min="0" max="30" value="${v}" onchange="state.required['${k}']=parseInt(this.value)||0" style="width:60px"></td>`;
        }).join('')}
      </tr>`).join('')}
    </tbody></table>`;
}

// ── Auto assign ────────────────────────
function runAutoAssign(){
  const dates=getDates();
  if(!dates.length||!state.slots.length||!state.workers.length){alert('期間・勤務枠・勤務者を先に設定してください');return;}
  const hasInput=state.workers.some(w=>Object.keys(state.availability[w]||{}).length>0);
  if(!hasInput){alert('勤務者が1人も希望を入力していません');return;}
  state.assigned={};
  const counts={};state.workers.forEach(w=>counts[w]=0);
  dates.forEach(date=>{
    state.slots.forEach(s=>{
      const k=date+'__'+s.id,req=reqFor(date,s.id);
      if(req===0){state.assigned[k]=[];return;}
      let cands=state.workers.filter(w=>(state.availability[w]||{})[k]);
      cands=cands.filter(w=>!state.slots.some(os=>{
        if(os.id===s.id)return false;
        return(state.assigned[date+'__'+os.id]||[]).includes(w);
      }));
      cands.sort((a,b)=>{const d=counts[a]-counts[b];return d!==0?d:(Math.random()-.5);});
      const assigned=cands.slice(0,req);
      state.assigned[k]=assigned;
      assigned.forEach(w=>counts[w]++);
    });
  });
  renderResultTable();renderShortageAuto();
  document.getElementById('result-card').style.display='block';
  const total=Object.entries(state.assigned).filter(([k])=>!k.endsWith('__manual')).reduce((s,[,a])=>s+(Array.isArray(a)?a.length:0),0);
  document.getElementById('result-stats').textContent=`合計 ${total} 件割り当て済み`;
  switchTab('auto');
}
function clearAssign(){
  if(!confirm('割り当て結果をリセットしますか？'))return;
  state.assigned={};
  document.getElementById('result-card').style.display='none';
  document.getElementById('shortage-auto-card').style.display='none';
  document.getElementById('auto-notice').innerHTML='';
}
function renderResultTable(){
  const dates=getDates(),tbl=document.getElementById('result-table');
  if(!Object.keys(state.assigned).length){tbl.innerHTML='';return;}
  let head=`<thead><tr><th class="name-col">勤務者</th>${dates.map(d=>`<th class="${isWe(d)?'we-col':''}" style="min-width:52px">${fmtDate(d)}</th>`).join('')}<th style="min-width:50px;background:var(--accent-bg);color:var(--accent-text)">回数</th></tr></thead>`;
  let body='<tbody>';
  state.workers.forEach(w=>{
    let cnt=0;
    body+=`<tr><td class="name-col">${esc(w)}</td>`;
    dates.forEach(date=>{
      let asgn=null,si=-1;
      state.slots.forEach((s,i)=>{if((state.assigned[date+'__'+s.id]||[]).includes(w)){asgn=s;si=i;}});
      if(asgn){
        cnt++;
        const isM=(state.assigned[date+'__'+asgn.id+'__manual']||[]).includes(w);
        body+=`<td class="${isWe(date)?'we-col':''}"><span class="cell-assigned ${slotColor(si)}${isM?' manual':''}" onclick="openEditModal('${esc(w)}','${date}')">${esc(asgn.name)}</span></td>`;
      } else {
        body+=`<td class="${isWe(date)?'we-col':''}"><span class="cell-assigned slot-off" onclick="openEditModal('${esc(w)}','${date}')">－</span></td>`;
      }
    });
    body+=`<td class="count-cell">${cnt}</td></tr>`;
  });
  body+=`<tr style="border-top:2px solid var(--border)"><td class="name-col" style="font-weight:600;font-size:11px;color:var(--text-muted)">充足</td>`;
  dates.forEach(date=>{
    const parts=state.slots.map(s=>{
      const k=date+'__'+s.id,got=(state.assigned[k]||[]).length,req=reqFor(date,s.id);
      if(req===0)return null;
      return `<span style="font-size:10px;font-weight:600;color:${got>=req?'var(--success)':'var(--danger)'}">${got}/${req}</span>`;
    }).filter(Boolean);
    body+=`<td class="${isWe(date)?'we-col':''}" style="font-size:10px;line-height:1.6">${parts.join('<br>')}</td>`;
  });
  body+=`<td></td></tr></tbody>`;
  tbl.innerHTML=head+body;
}
function renderShortageAuto(){
  const dates=getDates(),shortages=[];
  dates.forEach(date=>{state.slots.forEach(s=>{
    const k=date+'__'+s.id,got=(state.assigned[k]||[]).length,req=reqFor(date,s.id);
    if(req>0&&got<req)shortages.push({date,s,got,req});
  });});
  const card=document.getElementById('shortage-auto-card'),area=document.getElementById('shortage-auto-area');
  if(shortages.length){
    card.style.display='block';
    area.innerHTML=shortages.map(sh=>`
      <div class="shift-block">
        <span class="shift-name">${fmtDate(sh.date)} ${esc(sh.s.name)}</span>
        <span class="badge badge-danger">${sh.got}/${sh.req}名</span>
        <span style="font-size:12px;color:var(--text-muted)">希望者不足</span>
      </div>`).join('');
    document.getElementById('auto-notice').innerHTML=`<div class="notice notice-warning">${shortages.length}件で人数不足。「－」をクリックして手動追加してください。</div>`;
  } else {
    card.style.display='none';
    document.getElementById('auto-notice').innerHTML=`<div class="notice" style="background:var(--success-bg);color:var(--success);border:1px solid var(--success-border)">すべての日程で必要人数を満たしています！</div>`;
  }
}

// ── Edit modal ─────────────────────────
function openEditModal(worker,date){
  modalCtx={worker,date};
  document.getElementById('modal-title').textContent=`${fmtDate(date)} / ${worker}`;
  let cur=null;
  state.slots.forEach(s=>{if((state.assigned[date+'__'+s.id]||[]).includes(worker))cur=s.id;});
  const avail=state.availability[worker]||{};
  let html=`<p style="font-size:13px;color:var(--text-muted);margin-bottom:12px">割り当てる枠を選択してください</p><div style="display:flex;flex-direction:column;gap:8px">
    <label style="display:flex;align-items:center;gap:10px;cursor:pointer;padding:10px;border-radius:var(--radius);border:1px solid var(--border);font-weight:400">
      <input type="radio" name="slot-pick" value="__none" ${!cur?'checked':''}><span>休み・割り当てなし</span>
    </label>`;
  state.slots.forEach((s,i)=>{
    const k=date+'__'+s.id,can=avail[k];
    html+=`<label style="display:flex;align-items:center;gap:10px;cursor:pointer;padding:10px;border-radius:var(--radius);border:1px solid var(--border);font-weight:400${can?'':';opacity:.55'}">
      <input type="radio" name="slot-pick" value="${s.id}" ${cur===s.id?'checked':''}>
      <span class="cell-assigned ${slotColor(i)}">${esc(s.name)}</span>
      <span style="font-size:12px;color:var(--text-muted)">${s.start}〜${s.end}</span>
      <span class="badge ${can?'badge-green':'badge-gray'}" style="margin-left:auto;font-size:11px">${can?'希望あり':'希望なし'}</span>
    </label>`;
  });
  html+='</div>';
  document.getElementById('modal-body').innerHTML=html;
  document.getElementById('modal-bg').style.display='flex';
}
function closeModal(){document.getElementById('modal-bg').style.display='none';}
function applyModal(){
  const {worker,date}=modalCtx;
  const picked=document.querySelector('input[name="slot-pick"]:checked');
  if(!picked){closeModal();return;}
  const newSid=picked.value==='__none'?null:picked.value;
  state.slots.forEach(s=>{
    const k=date+'__'+s.id;
    if(!state.assigned[k])state.assigned[k]=[];
    state.assigned[k]=state.assigned[k].filter(w=>w!==worker);
    const mk=k+'__manual';
    if(state.assigned[mk])state.assigned[mk]=state.assigned[mk].filter(w=>w!==worker);
  });
  if(newSid){
    const k=date+'__'+newSid;
    if(!state.assigned[k])state.assigned[k]=[];
    state.assigned[k].push(worker);
    const mk=k+'__manual';
    if(!state.assigned[mk])state.assigned[mk]=[];
    state.assigned[mk].push(worker);
  }
  closeModal();renderResultTable();renderShortageAuto();
  const total=Object.entries(state.assigned).filter(([k])=>!k.endsWith('__manual')).reduce((s,[,a])=>s+(Array.isArray(a)?a.length:0),0);
  document.getElementById('result-stats').textContent=`合計 ${total} 件割り当て済み`;
}

// ── Summary ────────────────────────────
function renderSummary(){
  const area=document.getElementById('summary-area'),dates=getDates();
  if(!dates.length||!state.slots.length||!state.workers.length){area.innerHTML='<p style="font-size:13px;color:var(--text-muted)">データを読み込んでください</p>';return;}
  const submitted=state.workers.filter(w=>Object.keys(state.availability[w]||{}).length>0);
  const notYet=state.workers.filter(w=>!Object.keys(state.availability[w]||{}).length);
  let html=`<div class="status-bar"><span class="badge badge-green">入力済 ${submitted.length}名</span><span class="badge badge-gray">未入力 ${notYet.length}名</span></div>`;
  if(notYet.length)html+=`<div class="notice notice-warning" style="margin-bottom:12px">未入力: ${notYet.map(w=>`<strong>${esc(w)}</strong>`).join('、')}</div>`;
  const showDates=dates.slice(0,31);
  html+=`<div style="overflow-x:auto"><table class="sum-table"><thead><tr><th>勤務枠</th>${showDates.map(d=>`<th style="${isWe(d)?'background:var(--warning-bg)':''}">${fmtDate(d)}</th>`).join('')}</tr></thead><tbody>
    ${state.slots.map(s=>`<tr><td><strong>${esc(s.name)}</strong><br><span style="font-size:11px;color:var(--text-muted)">${s.start}〜${s.end}</span></td>
      ${showDates.map(date=>{
        const k=date+'__'+s.id,okW=state.workers.filter(w=>(state.availability[w]||{})[k]),req=reqFor(date,s.id);
        return `<td title="${okW.join(', ')||'なし'}" style="${isWe(date)?'background:var(--warning-bg)':''}"><span class="${okW.length>=req?'cell-ok':'cell-ng'}">${okW.length}</span><span style="font-size:11px;color:var(--text-muted)">/${req}</span></td>`;
      }).join('')}
    </tr>`).join('')}
  </tbody></table></div>`;
  if(dates.length>31)html+=`<p style="font-size:12px;color:var(--text-muted);margin-top:6px">※ 最初の31日を表示（全${dates.length}日）</p>`;
  area.innerHTML=html;
  const shortCard=document.getElementById('shortage-card'),shortArea=document.getElementById('shortage-area');
  const shortages=[];
  dates.forEach(date=>{state.slots.forEach(s=>{
    const k=date+'__'+s.id,okW=state.workers.filter(w=>(state.availability[w]||{})[k]),req=reqFor(date,s.id);
    if(okW.length<req)shortages.push({date,s,okCount:okW.length,req});
  });});
  if(shortages.length){
    shortCard.style.display='block';
    shortArea.innerHTML=shortages.map(sh=>`<div class="shift-block"><span class="shift-name">${fmtDate(sh.date)} ${esc(sh.s.name)}</span><span class="badge badge-danger">${sh.okCount}/${sh.req}名</span></div>`).join('');
  } else {shortCard.style.display='none';}
}

function renderAll(){renderSlotList();renderWorkerList();renderDayCfg();}

loadFromCloud(false);
</script>
