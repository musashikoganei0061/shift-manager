<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>勤務希望入力</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F8F7F4;--surface:#FFFFFF;--surface2:#F2F1EE;
  --border:#E2E0DA;--border-strong:#CCCAC3;
  --text:#1A1917;--text-muted:#6B6860;--text-light:#9E9C96;
  --accent:#2563EB;--accent-bg:#EFF4FE;--accent-border:#BFCFFE;--accent-text:#1D4ED8;
  --success:#059669;--success-bg:#ECFDF5;--success-border:#A7F3D0;
  --warning:#D97706;--warning-bg:#FFFBEB;--warning-border:#FDE68A;
  --danger:#DC2626;--danger-bg:#FEF2F2;--danger-border:#FECACA;
  --radius:8px;--shadow:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.04);
}
@media(prefers-color-scheme:dark){:root{
  --bg:#1A1917;--surface:#242320;--surface2:#2C2B28;
  --border:#3A3935;--border-strong:#4E4D48;
  --text:#F0EEE8;--text-muted:#9E9C96;--text-light:#6B6860;
  --accent:#3B82F6;--accent-bg:#1E293B;--accent-border:#1D4ED8;--accent-text:#93C5FD;
  --success:#10B981;--success-bg:#064E3B;--success-border:#065F46;
  --warning:#F59E0B;--warning-bg:#451A03;--warning-border:#92400E;
  --danger:#EF4444;--danger-bg:#450A0A;--danger-border:#7F1D1D;
}}
body{font-family:-apple-system,'Hiragino Kaku Gothic ProN','Hiragino Sans',sans-serif;background:var(--bg);color:var(--text);font-size:15px;line-height:1.6;min-height:100vh}
.header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 1.5rem;position:sticky;top:0;z-index:100;box-shadow:var(--shadow)}
.header-inner{max-width:760px;margin:0 auto;display:flex;align-items:center;gap:10px;height:56px}
.logo{font-size:16px;font-weight:600;letter-spacing:-.3px}.logo span{color:var(--success)}
.sync-status{margin-left:auto;font-size:12px;color:var(--text-muted);display:flex;align-items:center;gap:6px}
.dot{width:8px;height:8px;border-radius:50%;background:var(--border-strong);flex-shrink:0}
.dot.ok{background:var(--success)}.dot.err{background:var(--danger)}.dot.spin{background:var(--warning)}
.main{max-width:760px;margin:0 auto;padding:1.5rem}
.card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:1.25rem 1.5rem;margin-bottom:1rem}
.card-title{font-size:12px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:1rem}
label{font-size:13px;font-weight:500;color:var(--text-muted);display:block;margin-bottom:5px}
input[type=text],select{width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:var(--radius);background:var(--bg);color:var(--text);font-size:14px;font-family:inherit;transition:border-color .15s;outline:none;appearance:none;-webkit-appearance:none}
input:focus,select:focus{border-color:var(--accent);box-shadow:0 0 0 3px color-mix(in srgb,var(--accent) 15%,transparent)}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border:1px solid var(--border-strong);border-radius:var(--radius);background:var(--surface);color:var(--text);cursor:pointer;font-size:13px;font-weight:500;font-family:inherit;transition:all .15s;white-space:nowrap}
.btn:hover{background:var(--surface2)}.btn:active{transform:scale(.98)}
.btn-primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn-primary:hover{background:color-mix(in srgb,var(--accent) 85%,#000)}
.btn-success{background:var(--success);color:#fff;border-color:var(--success)}
.btn-success:hover{background:color-mix(in srgb,var(--success) 85%,#000)}
.btn-sm{padding:5px 12px;font-size:12px}
.notice{padding:10px 14px;border-radius:var(--radius);font-size:13px;display:flex;align-items:flex-start;gap:8px}
.notice-info{background:var(--accent-bg);color:var(--accent-text);border:1px solid var(--accent-border)}
.notice-warning{background:var(--warning-bg);color:var(--warning);border:1px solid var(--warning-border)}
.notice-success{background:var(--success-bg);color:var(--success);border:1px solid var(--success-border)}
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:500}
.badge-green{background:var(--success-bg);color:var(--success);border:1px solid var(--success-border)}
.badge-gray{background:var(--surface2);color:var(--text-muted);border:1px solid var(--border)}
/* Availability grid */
.avail-header{display:grid;padding:8px 0;border-bottom:2px solid var(--border-strong);margin-bottom:2px}
.avail-row{display:grid;align-items:center;padding:6px 0;border-bottom:1px solid var(--border)}
.avail-row:last-child{border-bottom:none}
.avail-row.we{background:color-mix(in srgb,var(--warning-bg) 55%,transparent);border-radius:6px;padding:6px 8px;margin:1px -8px}
.day-label{font-size:13px;font-weight:500;white-space:nowrap}
.chip{padding:6px 14px;border-radius:20px;font-size:13px;font-weight:500;border:1px solid var(--border);background:var(--surface);color:var(--text-muted);cursor:pointer;transition:all .15s;user-select:none;white-space:nowrap;-webkit-tap-highlight-color:transparent}
.chip:hover{border-color:var(--border-strong);color:var(--text)}
.chip.on{background:var(--success-bg);border-color:var(--success-border);color:var(--success)}
/* Result display */
.result-table{width:100%;border-collapse:collapse;font-size:13px}
.result-table th{text-align:left;padding:7px 10px;font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.04em;color:var(--text-muted);border-bottom:1px solid var(--border);background:var(--surface2)}
.result-table td{padding:8px 10px;border-bottom:1px solid var(--border)}
.result-table tr:last-child td{border-bottom:none}
.slot-pill{display:inline-block;padding:2px 10px;border-radius:12px;font-size:12px;font-weight:600}
.slot-0{background:var(--accent-bg);color:var(--accent-text);border:1px solid var(--accent-border)}
.slot-1{background:var(--success-bg);color:var(--success);border:1px solid var(--success-border)}
.slot-2{background:var(--warning-bg);color:var(--warning);border:1px solid var(--warning-border)}
.slot-3{background:var(--danger-bg);color:var(--danger);border:1px solid var(--danger-border)}
@media(max-width:500px){.main{padding:1rem}.chip{padding:5px 10px;font-size:12px}}
</style>
</head>
<body>
<header class="header">
  <div class="header-inner">
    <div class="logo">勤務希望<span>入力</span></div>
    <div class="sync-status">
      <span class="dot" id="sync-dot"></span>
      <span id="sync-label">接続中...</span>
    </div>
  </div>
</header>
<main class="main">

  <!-- ステップ1: 名前選択 -->
  <div class="card" id="step-name">
    <div class="card-title">あなたの名前を選択</div>
    <select id="worker-select" onchange="onWorkerSelect()" style="margin-bottom:0">
      <option value="">-- 名前を選んでください --</option>
    </select>
    <p style="font-size:12px;color:var(--text-muted);margin-top:8px">名前が表示されない場合は管理者にご連絡ください</p>
  </div>

  <!-- ステップ2: 希望入力 -->
  <div id="step-input" style="display:none">
    <div class="card">
      <div class="card-title">勤務希望を入力</div>
      <p style="font-size:13px;color:var(--text-muted);margin-bottom:4px">勤務できる日の枠をタップしてください。もう一度タップで解除します。</p>
      <div id="selected-count" style="font-size:13px;font-weight:500;color:var(--accent-text);margin-bottom:12px"></div>
      <div id="avail-grid"></div>
      <div style="margin-top:16px;display:flex;gap:10px;flex-wrap:wrap;align-items:center">
        <button class="btn btn-success" onclick="submitAvailability()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>
          送信する
        </button>
        <button class="btn btn-sm" onclick="clearAll()">すべて解除</button>
      </div>
    </div>
  </div>

  <!-- ステップ3: 割り当て結果表示 -->
  <div id="step-result" style="display:none">
    <div class="card">
      <div class="card-title">あなたの勤務割り当て</div>
      <div id="assigned-result"></div>
      <div style="margin-top:12px">
        <button class="btn btn-sm" onclick="showInput()">希望を修正する</button>
      </div>
    </div>
  </div>

  <!-- ローディング -->
  <div id="loading" style="text-align:center;padding:2rem;color:var(--text-muted);font-size:14px">データを読み込んでいます...</div>

</main>

<script>
const BIN_ID = '6a4a22b779fa234c87d99770';
const API_KEY = '$2a$10$AefCCnZQSmM9s4rYdVmfoOkT6Q04DJxzACNzneVgQRqpYOIWiGRw6';
const API_URL = `https://api.jsonbin.io/v3/b/${BIN_ID}`;

let state = null;
let currentWorker = null;

// ── Utilities ──────────────────────────
function getDates(){
  const res=[];const d=new Date(state.startDate);const end=new Date(state.endDate);
  while(d<=end){res.push(d.toISOString().slice(0,10));d.setDate(d.getDate()+1);}return res;
}
function fmtDate(s){const d=new Date(s+'T00:00:00');return `${d.getMonth()+1}/${d.getDate()}(${'日月火水木金土'[d.getDay()]})`;}
function fmtDateLong(s){const d=new Date(s+'T00:00:00');const wd=['日','月','火','水','木','金','土'];return `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日（${wd[d.getDay()]}）`;}
function isWe(s){const d=new Date(s+'T00:00:00');return d.getDay()===0||d.getDay()===6;}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}
function slotColor(i){return ['slot-0','slot-1','slot-2','slot-3'][i%4];}

function setSyncStatus(type,msg){
  document.getElementById('sync-dot').className='dot '+type;
  document.getElementById('sync-label').textContent=msg;
}
function showToast(msg,type){
  let t=document.getElementById('toast');
  if(!t){t=document.createElement('div');t.id='toast';t.style.cssText='position:fixed;bottom:24px;left:50%;transform:translateX(-50%);padding:10px 20px;border-radius:20px;font-size:13px;font-weight:500;z-index:999;transition:opacity .3s;pointer-events:none';document.body.appendChild(t);}
  t.style.background=type==='success'?'var(--success)':type==='err'?'var(--danger)':'var(--text)';
  t.style.color='#fff';
  t.textContent=msg;t.style.opacity='1';clearTimeout(t._t);t._t=setTimeout(()=>{t.style.opacity='0';},2500);
}

// ── Cloud ──────────────────────────────
async function loadFromCloud(){
  setSyncStatus('spin','読み込み中...');
  try{
    const r=await fetch(API_URL+'/latest',{headers:{'X-Master-Key':API_KEY}});
    if(!r.ok)throw new Error('HTTP '+r.status);
    const j=await r.json();
    state=j.record;
    if(!state||!state.slots||!state.workers)throw new Error('データ形式が正しくありません');
    setSyncStatus('ok','接続済み');
    document.getElementById('loading').style.display='none';
    document.getElementById('step-name').style.display='block';
    renderWorkerSelect();
    // 前回の選択を復元
    const saved=localStorage.getItem('shift_worker_name');
    if(saved&&state.workers.includes(saved)){
      document.getElementById('worker-select').value=saved;
      onWorkerSelect();
    }
  }catch(e){
    setSyncStatus('err','接続失敗');
    document.getElementById('loading').innerHTML=`<div class="notice" style="background:var(--danger-bg);color:var(--danger);border:1px solid var(--danger-border)">データの読み込みに失敗しました。<br>ページを再読み込みしてください。<br><small>${e.message}</small></div>`;
  }
}
async function saveToCloud(){
  setSyncStatus('spin','送信中...');
  try{
    const r=await fetch(API_URL,{
      method:'PUT',
      headers:{'Content-Type':'application/json','X-Master-Key':API_KEY},
      body:JSON.stringify(state)
    });
    if(!r.ok)throw new Error('HTTP '+r.status);
    setSyncStatus('ok','送信済み');
    showToast('送信しました！','success');
  }catch(e){
    setSyncStatus('err','送信失敗');
    showToast('送信に失敗しました: '+e.message,'err');
  }
}

// ── Worker select ──────────────────────
function renderWorkerSelect(){
  const sel=document.getElementById('worker-select');
  sel.innerHTML='<option value="">-- 名前を選んでください --</option>'+
    (state.workers||[]).map(w=>`<option value="${esc(w)}">${esc(w)}</option>`).join('');
}
function onWorkerSelect(){
  const name=document.getElementById('worker-select').value;
  if(!name){
    document.getElementById('step-input').style.display='none';
    document.getElementById('step-result').style.display='none';
    return;
  }
  currentWorker=name;
  localStorage.setItem('shift_worker_name',name);
  // 割り当て結果があれば表示
  if(Object.keys(state.assigned||{}).length>0){
    renderAssignedResult();
    document.getElementById('step-result').style.display='block';
    document.getElementById('step-input').style.display='none';
  } else {
    showInput();
  }
}
function showInput(){
  document.getElementById('step-result').style.display='none';
  document.getElementById('step-input').style.display='block';
  renderAvailGrid();
}

// ── Availability grid ──────────────────
function renderAvailGrid(){
  if(!state||!currentWorker)return;
  if(!state.availability[currentWorker])state.availability[currentWorker]={};
  const dates=getDates();
  const slots=state.slots||[];
  if(!dates.length||!slots.length){
    document.getElementById('avail-grid').innerHTML='<div class="notice notice-warning">管理者がまだ設定を完了していません</div>';
    return;
  }
  const colW=Math.max(72,Math.floor((520-120)/slots.length));
  const cols=`120px ${slots.map(()=>colW+'px').join(' ')}`;
  let html=`<div class="avail-header" style="grid-template-columns:${cols}">
    <span style="font-size:12px;color:var(--text-light);font-weight:600">日付</span>
    ${slots.map(s=>`<span style="font-size:12px;color:var(--text-light);font-weight:600;text-align:center">${esc(s.name)}<br><span style="font-weight:400;font-size:10px">${s.start}〜${s.end}</span></span>`).join('')}
  </div>`;
  html+=dates.map(date=>{
    const we=isWe(date);
    return `<div class="avail-row${we?' we':''}" style="grid-template-columns:${cols}">
      <span class="day-label">${fmtDate(date)}</span>
      ${slots.map(s=>{
        const k=date+'__'+s.id,on=(state.availability[currentWorker]||{})[k];
        return `<span class="chip${on?' on':''}" onclick="toggleChip('${k}',this)">${esc(s.name)}</span>`;
      }).join('')}
    </div>`;
  }).join('');
  document.getElementById('avail-grid').innerHTML=html;
  updateCount();
}
function toggleChip(key,el){
  if(!state.availability[currentWorker])state.availability[currentWorker]={};
  state.availability[currentWorker][key]=!state.availability[currentWorker][key];
  el.classList.toggle('on',state.availability[currentWorker][key]);
  updateCount();
}
function updateCount(){
  const cnt=Object.values(state.availability[currentWorker]||{}).filter(Boolean).length;
  document.getElementById('selected-count').textContent=cnt?`${cnt}枠 選択中`:'まだ選択していません';
}
function clearAll(){
  if(!confirm('すべての選択を解除しますか？'))return;
  state.availability[currentWorker]={};
  renderAvailGrid();
}
async function submitAvailability(){
  const cnt=Object.values(state.availability[currentWorker]||{}).filter(Boolean).length;
  if(cnt===0&&!confirm('選択がゼロ件です。このまま送信しますか？'))return;
  await saveToCloud();
}

// ── Assigned result ────────────────────
function renderAssignedResult(){
  const assigned=state.assigned||{};
  const slots=state.slots||[];
  const dates=getDates();
  const myDays=[];
  dates.forEach(date=>{
    slots.forEach((s,i)=>{
      const k=date+'__'+s.id;
      if((assigned[k]||[]).includes(currentWorker)){
        myDays.push({date,slot:s,idx:i});
      }
    });
  });
  const area=document.getElementById('assigned-result');
  if(!myDays.length){
    area.innerHTML=`<div class="notice notice-info">まだ割り当てが確定していません。<br>管理者が割り当てを実行するとここに表示されます。</div>
      <div style="margin-top:10px"><button class="btn btn-sm btn-primary" onclick="showInput()">希望を入力・修正する</button></div>`;
    return;
  }
  area.innerHTML=`<p style="font-size:13px;color:var(--text-muted);margin-bottom:12px">合計 <strong style="color:var(--text)">${myDays.length}日</strong> 割り当てられています</p>
    <table class="result-table">
      <thead><tr><th>日付</th><th>勤務枠</th><th>時間</th></tr></thead>
      <tbody>${myDays.map(({date,slot,idx})=>`
        <tr>
          <td style="white-space:nowrap">${fmtDateLong(date)}</td>
          <td><span class="slot-pill ${slotColor(idx)}">${esc(slot.name)}</span></td>
          <td style="font-size:13px;color:var(--text-muted)">${slot.start}〜${slot.end}</td>
        </tr>`).join('')}
      </tbody>
    </table>`;
}

// ── Init ───────────────────────────────
document.getElementById('step-name').style.display='none';
loadFromCloud();
</script>
</body>
</html>
